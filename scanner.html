{% extends "base.html" %}

{% block title %}QR Tool - Scanner{% endblock %}

{% block content %}
<h1>QR Code Scanner</h1>
<p>Point your webcam at a QR code and click <strong>Start Scanning</strong>.</p>

<div class="scanner-area">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="capture-canvas" style="display:none;"></canvas>
</div>

<div class="scanner-controls">
    <button id="start-btn" onclick="startScanning()">Start Scanning</button>
    <button id="stop-btn" onclick="stopScanning()" disabled>Stop</button>
</div>

<div id="scan-result">
    <h3>Result:</h3>
    <p id="result-text">Nothing scanned yet.</p>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='scanner.js') }}"></script>
{% endblock %}
