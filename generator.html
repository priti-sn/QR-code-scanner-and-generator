{% extends "base.html" %}

{% block title %}QR Tool - Generator{% endblock %}

{% block content %}
<h1>QR Code Generator</h1>
<p>Enter any text or URL below and hit <strong>Generate</strong>.</p>

<form id="qr-form" action="{{ url_for('generate') }}" method="post">
    <textarea name="text" id="qr-input" rows="4" placeholder="https://example.com" required></textarea>
    <br>
    <button type="submit">Generate QR Code</button>
</form>

<div id="qr-output" style="display:none;">
    <h3>Your QR Code:</h3>
    <img id="qr-image" src="" alt="Generated QR code">
    <br>
    <a id="qr-download" href="" download="qrcode.png">Download</a>
</div>

<script>
    // intercept form submission so we can show the image inline
    var form = document.getElementById("qr-form");
    form.addEventListener("submit", function (e) {
        e.preventDefault();

        var inputText = document.getElementById("qr-input").value.trim();
        if (!inputText) return;

        var formData = new FormData();
        formData.append("text", inputText);

        fetch("{{ url_for('generate') }}", {
            method: "POST",
            body: formData
        })
        .then(function (response) {
            if (!response.ok) throw new Error("Server returned an error");
            return response.blob();
        })
        .then(function (blob) {
            var url = URL.createObjectURL(blob);
            document.getElementById("qr-image").src = url;
            document.getElementById("qr-download").href = url;
            document.getElementById("qr-output").style.display = "block";
        })
        .catch(function (err) {
            alert("Failed to generate QR code: " + err.message);
        });
    });
</script>
{% endblock %}
